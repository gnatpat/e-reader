name: Deploy installer page

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO and esptool
        run: pip install --upgrade platformio esptool

      - name: Build firmware
        run: pio run -e wireless-paper

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p site
          cp install/index.html site/

          BUILD_DIR=.pio/build/wireless-paper
          BOOT_APP0=$(find ~/.platformio/packages/framework-arduinoespressif32/tools/partitions -name boot_app0.bin | head -n1)

          cp "$BUILD_DIR/bootloader.bin" site/bootloader.bin
          cp "$BUILD_DIR/partitions.bin" site/partitions.bin
          cp "$BOOT_APP0"                site/boot_app0.bin
          cp "$BUILD_DIR/firmware.bin"   site/firmware.bin

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          jq --arg v "$VERSION" '.version = $v' install/manifest.json > site/manifest.json

          ls -lh site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
