; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

# Shared config — applies to every [env:*] below.
[env]
# pioarduino fork — ships arduino-esp32 3.x (IDF 5.x), matching the Arduino IDE
# default. The classic `platformio/espressif32` registry build is still on
# 2.0.17 (IDF 4.4), which keeps Heltec's deep-sleep path on a code branch that
# powers off RTC_PERIPH and breaks ext0 wake. See src/ui/sleep.cpp for context.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
extra_scripts = pre:scripts/build_info.py

# `test/` holds host-side CMake unit tests, not PlatformIO on-device tests.
# Tell `pio test` to ignore everything in there so it doesn't try to compile
# our laptop-only tests onto the ESP32.
test_ignore = *

lib_deps =
  https://github.com/todd-herbert/heltec-eink-modules.git
  adafruit/Adafruit GFX Library
  olikraus/U8g2_for_Adafruit_GFX

[env:wireless-paper-v1_2]
build_flags =
  -D WIRELESS_PAPER
  -D DISPLAY_V1_2
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -I apps/include

[env:wireless-paper-v1_1]
build_flags =
  -D WIRELESS_PAPER
  -D DISPLAY_V1_1
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -I apps/include