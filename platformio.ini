; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

# Shared config — applies to every [env:*] below.
[env]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
extra_scripts = pre:scripts/build_info.py

# `test/` holds host-side CMake unit tests, not PlatformIO on-device tests.
# Tell `pio test` to ignore everything in there so it doesn't try to compile
# our laptop-only tests onto the ESP32.
test_ignore = *

lib_deps =
  https://github.com/todd-herbert/heltec-eink-modules.git
  adafruit/Adafruit GFX Library
  olikraus/U8g2_for_Adafruit_GFX

[env:wireless-paper-v1_2]
build_flags =
  -D WIRELESS_PAPER
  -D DISPLAY_V1_2

[env:wireless-paper-v1_1]
build_flags =
  -D WIRELESS_PAPER
  -D DISPLAY_V1_1